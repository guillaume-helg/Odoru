spring.application.name=odoru-badge-service
server.port=8083

spring.data.mongodb.uri=mongodb://${MONGODB_HOST:localhost}:27017/odoru_badge_db
spring.data.mongodb.auto-index-creation=true

odoru.member-service.url=http://${MEMBER_SERVICE_HOST:localhost}:8080
odoru.lesson-service.url=http://${LESSON_SERVICE_HOST:localhost}:8081

# Explicit Resource Server JWT config
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://${KEYCLOAK_HOST:localhost}:${KEYCLOAK_PORT:8080}/realms/odoru/protocol/openid-connect/certs

logging.level.org.springframework.security=DEBUG

# Explicit OAuth2 Client config (Bypass discovery to avoid startup crash if Keycloak is slow)
spring.security.oauth2.client.registration.odoru-m2m.client-id=odoru-m2m
spring.security.oauth2.client.registration.odoru-m2m.client-secret=m2m-secret
spring.security.oauth2.client.registration.odoru-m2m.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.odoru-m2m.client-authentication-method=client_secret_basic
spring.security.oauth2.client.registration.odoru-m2m.scope=openid
spring.security.oauth2.client.registration.odoru-m2m.provider=keycloak

spring.security.oauth2.client.provider.keycloak.authorization-uri=http://${KEYCLOAK_HOST:localhost}:${KEYCLOAK_PORT:8080}/realms/odoru/protocol/openid-connect/auth
spring.security.oauth2.client.provider.keycloak.token-uri=http://${KEYCLOAK_HOST:localhost}:${KEYCLOAK_PORT:8080}/realms/odoru/protocol/openid-connect/token
spring.security.oauth2.client.provider.keycloak.jwk-set-uri=http://${KEYCLOAK_HOST:localhost}:${KEYCLOAK_PORT:8080}/realms/odoru/protocol/openid-connect/certs
# Disable discovery by not providing issuer-uri or keeping it only for validation if needed
# spring.security.oauth2.client.provider.keycloak.issuer-uri=http://${KEYCLOAK_HOST:localhost}:${KEYCLOAK_PORT:8080}/realms/odoru

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
