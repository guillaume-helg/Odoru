services:
  member-mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - member-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  lesson-mongo:
    image: mongo:7.0
    ports:
      - "27018:27017"
    volumes:
      - lesson-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  competition-mongo:
    image: mongo:7.0
    ports:
      - "27019:27017"
    volumes:
      - competition-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  badge-mongo:
    image: mongo:7.0
    ports:
      - "27020:27017"
    volumes:
      - badge-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.2
    command: start-dev --import-realm
    ports:
      - "9090:8080"
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_HEALTH_ENABLED=true
      - KC_HOSTNAME_URL=http://localhost:9090
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_STRICT_HTTPS=false
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s

  member-service:
    build:
      context: ./odoru-member-service
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - MONGODB_HOST=member-mongo
      - KEYCLOAK_HOST=keycloak
      - KEYCLOAK_PORT=8080
      - JAVA_TOOL_OPTIONS=-Xms128m -Xmx256m
    depends_on:
      member-mongo:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 8080"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 20s

  lesson-service:
    build:
      context: ./odoru-lesson-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - MONGODB_HOST=lesson-mongo
      - MEMBER_SERVICE_HOST=member-service
      - KEYCLOAK_HOST=keycloak
      - KEYCLOAK_PORT=8080
      - JAVA_TOOL_OPTIONS=-Xms128m -Xmx256m
    depends_on:
      lesson-mongo:
        condition: service_healthy
      member-service:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 8081"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 25s

  competition-service:
    build:
      context: ./odoru-competition-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      - MONGODB_HOST=competition-mongo
      - MEMBER_SERVICE_HOST=member-service
      - KEYCLOAK_HOST=keycloak
      - KEYCLOAK_PORT=8080
      - JAVA_TOOL_OPTIONS=-Xms128m -Xmx256m
    depends_on:
      competition-mongo:
        condition: service_healthy
      member-service:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 8082"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 25s

  badge-service:
    build:
      context: ./odoru-badge-service
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      - MONGODB_HOST=badge-mongo
      - MEMBER_SERVICE_HOST=member-service
      - LESSON_SERVICE_HOST=lesson-service
      - KEYCLOAK_HOST=keycloak
      - KEYCLOAK_PORT=8080
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - JAVA_TOOL_OPTIONS=-Xms128m -Xmx256m
    depends_on:
      badge-mongo:
        condition: service_healthy
      member-service:
        condition: service_healthy
      lesson-service:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 8083"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 25s

  stats-service:
    build:
      context: ./odoru-stats-service
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    environment:
      - MEMBER_SERVICE_HOST=member-service
      - LESSON_SERVICE_HOST=lesson-service
      - COMPETITION_SERVICE_HOST=competition-service
      - BADGE_SERVICE_HOST=badge-service
      - KEYCLOAK_HOST=keycloak
      - KEYCLOAK_PORT=8080
      - JAVA_TOOL_OPTIONS=-Xms128m -Xmx256m
    depends_on:
      member-service:
        condition: service_healthy
      lesson-service:
        condition: service_healthy
      competition-service:
        condition: service_healthy
      badge-service:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 8084"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 25s

  krakend:
    image: devopsfaith/krakend:2.7.0
    ports:
      - "8000:8080"
    volumes:
      - ./krakend/krakend.json:/etc/krakend/krakend.json
    depends_on:
      member-service:
        condition: service_healthy
      lesson-service:
        condition: service_healthy
      competition-service:
        condition: service_healthy
      badge-service:
        condition: service_healthy
      stats-service:
        condition: service_healthy

volumes:
  member-mongo-data:
  lesson-mongo-data:
  competition-mongo-data:
  badge-mongo-data:
  rabbitmq-data:
