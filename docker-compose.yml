services:
  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.2
    command: start-dev --import-realm
    ports:
      - "9090:8080"
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  member-service:
    build:
      context: ./odoru-member-service
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/odoru_member_db
      - KEYCLOAK_HOST=keycloak
      - KEYCLOAK_PORT=8080
    depends_on:
      mongodb:
        condition: service_healthy
      keycloak:
        condition: service_started
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  lesson-service:
    build:
      context: ./odoru-lesson-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/odoru_lesson_db
      - MEMBER_SERVICE_HOST=member-service
      - KEYCLOAK_HOST=keycloak
      - KEYCLOAK_PORT=8080
    depends_on:
      mongodb:
        condition: service_healthy
      member-service:
        condition: service_healthy
      keycloak:
        condition: service_started
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8081"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  competition-service:
    build:
      context: ./odoru-competition-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/odoru_competition_db
      - MEMBER_SERVICE_HOST=member-service
      - KEYCLOAK_HOST=keycloak
      - KEYCLOAK_PORT=8080
    depends_on:
      mongodb:
        condition: service_healthy
      member-service:
        condition: service_healthy
      keycloak:
        condition: service_started
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8082"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  badge-service:
    build:
      context: ./odoru-badge-service
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      - MONGODB_HOST=mongodb
      - MEMBER_SERVICE_HOST=member-service
      - LESSON_SERVICE_HOST=lesson-service
      - KEYCLOAK_HOST=keycloak
      - KEYCLOAK_PORT=8080
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
    depends_on:
      mongodb:
        condition: service_healthy
      member-service:
        condition: service_healthy
      lesson-service:
        condition: service_healthy
      keycloak:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8083"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  stats-service:
    build:
      context: ./odoru-stats-service
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    environment:
      - MEMBER_SERVICE_HOST=member-service
      - LESSON_SERVICE_HOST=lesson-service
      - COMPETITION_SERVICE_HOST=competition-service
      - BADGE_SERVICE_HOST=badge-service
      - KEYCLOAK_HOST=keycloak
      - KEYCLOAK_PORT=8080
    depends_on:
      member-service:
        condition: service_healthy
      lesson-service:
        condition: service_healthy
      competition-service:
        condition: service_healthy
      badge-service:
        condition: service_healthy
      keycloak:
        condition: service_started
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8084"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  krakend:
    image: devopsfaith/krakend:2.7.0
    ports:
      - "8000:8080"
    volumes:
      - ./krakend/krakend.json:/etc/krakend/krakend.json
    depends_on:
      member-service:
        condition: service_healthy
      lesson-service:
        condition: service_healthy
      competition-service:
        condition: service_healthy
      badge-service:
        condition: service_healthy
      stats-service:
        condition: service_healthy

volumes:
  mongo-data:
