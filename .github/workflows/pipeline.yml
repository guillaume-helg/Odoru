name: Odoru CI/CD Pipeline

on:
  push:
    branches: [ main, 1-feat-back-office-member-management ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  dagger-ci:
    name: Run Dagger CI Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dagger-io anyio

      - name: Run Dagger Pipeline
        uses: dagger/dagger-for-github@v6
        with:
          version: "latest"
          verb: run
          args: python ci.py

      - name: Upload OpenAPI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: odoru-member-service/target/openapi.json

  deploy-swagger:
    name: Deploy Swagger UI to GitHub Pages
    needs: dagger-ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download OpenAPI Spec
        uses: actions/download-artifact@v4
        with:
          name: openapi-spec
          path: .

      - name: Setup Swagger UI
        run: |
          mkdir public
          cp openapi.json public/
          cat > public/index.html <<EOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <title>Odoru API Documentation</title>
            <link rel="stylesheet" type="text/css" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
            <style>
              html { box-sizing: border-box; overflow: -moz-scrollbars-vertical; overflow-y: scroll; }
              *, *:before, *:after { box-sizing: inherit; }
              body { margin: 0; background: #fafafa; }
            </style>
          </head>
          <body>
            <div id="swagger-ui"></div>
            <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
            <script>
              window.onload = function() {
                const ui = SwaggerUIBundle({
                  url: "openapi.json",
                  dom_id: '#swagger-ui',
                  deepLinking: true,
                  presets: [ SwaggerUIBundle.presets.apis ],
                  layout: "BaseLayout"
                });
              };
            </script>
          </body>
          </html>
          EOF

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
