name: Odoru CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  dagger-ci:
    name: Run Dagger CI Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dagger-io anyio

      - name: Run Dagger Pipeline
        uses: dagger/dagger-for-github@v6
        with:
          version: "latest"
          verb: run
          args: python ci.py

      - name: Upload OpenAPI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          if-no-files-found: error
          path: |
            odoru-member-service/target/openapi.json
            odoru-lesson-service/target/openapi.json
            odoru-competition-service/target/openapi.json
            odoru-badge-service/target/openapi.json
            odoru-stats-service/target/openapi.json

  deploy-swagger:
    name: Deploy Swagger UI to GitHub Pages
    needs: dagger-ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download OpenAPI Spec
        uses: actions/download-artifact@v4
        with:
          name: openapi-spec
          path: .

      - name: Generate Swagger UI
        run: |
          set -euo pipefail
          mkdir -p public
          cp odoru-member-service/target/openapi.json public/member.json
          cp odoru-lesson-service/target/openapi.json public/lesson.json
          cp odoru-competition-service/target/openapi.json public/competition.json
          cp odoru-badge-service/target/openapi.json public/badge.json
          cp odoru-stats-service/target/openapi.json public/stats.json
          # Fail the deploy if any spec is missing or empty (avoids "No API definition provided")
          for f in member lesson competition badge stats; do
            test -s "public/$f.json" || { echo "ERROR: public/$f.json is missing or empty"; exit 1; }
          done
          cat > public/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>Odoru API — Swagger UI</title>
              <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css" />
            </head>
            <body>
              <div id="swagger-ui"></div>
              <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js" crossorigin></script>
              <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-standalone-preset.js" crossorigin></script>
              <script>
                window.ui = SwaggerUIBundle({
                  urls: [
                    { name: "Member Service", url: "./member.json" },
                    { name: "Lesson Service", url: "./lesson.json" },
                    { name: "Competition Service", url: "./competition.json" },
                    { name: "Badge Service", url: "./badge.json" },
                    { name: "Stats Service", url: "./stats.json" },
                  ],
                  "urls.primaryName": "Member Service",
                  dom_id: "#swagger-ui",
                  presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIStandalonePreset,
                  ],
                  layout: "StandaloneLayout",
                });
              </script>
            </body>
          </html>
          EOF

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
