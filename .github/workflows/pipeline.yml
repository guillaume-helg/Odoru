name: Odoru CI/CD Pipeline

on:
  push:
    branches: [ main, 1-feat-back-office-member-management ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  dagger-ci:
    name: Run Dagger CI Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dagger-io anyio

      - name: Run Dagger Pipeline
        uses: dagger/dagger-for-github@v6
        with:
          version: "latest"
          verb: run
          args: python ci.py

      - name: Upload OpenAPI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: odoru-member-service/target/openapi.json

  deploy-swagger:
    name: Deploy Swagger UI to GitHub Pages
    needs: dagger-ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download OpenAPI Spec
        uses: actions/download-artifact@v4
        with:
          name: openapi-spec
          path: .

      - name: Generate Swagger UI
        uses: peter-evans/swagger-ui-action@v3
        with:
          output: public
          spec-file: openapi.json

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
