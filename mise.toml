[tools]
java = "temurin-26"
maven = "3.9"
python = "3.12"
node = "22"

[tasks.up]
description = "Build and start Keycloak, MongoDB, Krakend Gateway, and all services using Docker Compose"
run = "docker compose up --build -d"

[tasks.start]
description = "Start all Docker Compose services without rebuilding images"
run = "docker compose up -d"

[tasks.down]
description = "Stop all Docker Compose services"
run = "docker compose down"

[tasks.destroy]
env = { MISE_NO_INSTALL = "1" }
description = "Completely destroy all containers, volumes, and local images for this project"
run = "docker compose down -v --rmi local"

[tasks.reset]
env = { MISE_NO_INSTALL = "1" }
description = "Wipe everything and recreate the environment from scratch"
run = "mise run destroy && mise run up"

[tasks.test]
description = "Run unit tests across all microservices"
run = """
mvn -f odoru-member-service/pom.xml test && \
mvn -f odoru-lesson-service/pom.xml test && \
mvn -f odoru-competition-service/pom.xml test && \
mvn -f odoru-badge-service/pom.xml test && \
mvn -f odoru-stats-service/pom.xml test
"""

[tasks.lint]
description = "Run checkstyle verification across all microservices"
run = """
mvn -f odoru-member-service/pom.xml checkstyle:check && \
mvn -f odoru-lesson-service/pom.xml checkstyle:check && \
mvn -f odoru-competition-service/pom.xml checkstyle:check && \
mvn -f odoru-badge-service/pom.xml checkstyle:check && \
mvn -f odoru-stats-service/pom.xml checkstyle:check
"""

[tasks.ci]
description = "Run local CI pipeline with Dagger"
run = "python ci.py"

[tasks.test-e2e]
description = "Run end-to-end API tests using Bruno"
env = { MISE_NO_INSTALL = "1" }
run = "cd bruno && npx -y @usebruno/cli run --env Local"
